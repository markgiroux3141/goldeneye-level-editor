<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoldenEye Level Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: monospace; color: #ccc; }
        canvas { display: block; }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #ui select, #ui button {
            font-family: monospace;
            font-size: 14px;
            padding: 4px 8px;
            background: #222;
            color: #ccc;
            border: 1px solid #555;
            cursor: pointer;
        }
        #ui select:hover, #ui button:hover { border-color: #aaa; }

        #mode-label {
            font-size: 13px;
            color: #888;
        }

        #loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #fff;
            z-index: 20;
        }

        #crosshair {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            z-index: 5;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 0, 0.6);
        }
        #crosshair::before { width: 12px; height: 2px; top: 5px; left: 0; }
        #crosshair::after  { width: 2px; height: 12px; top: 0; left: 5px; }

        #lock-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #aaa;
            z-index: 5;
            pointer-events: none;
        }

        #speed-display {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 13px;
            color: #888;
            z-index: 10;
            pointer-events: none;
        }

        #analysis-panel {
            display: none;
            position: absolute;
            top: 40px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #444;
            padding: 10px;
            font-size: 12px;
            width: 220px;
        }
        #analysis-panel label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        #analysis-panel input[type="range"] {
            width: 110px;
            accent-color: #4a4;
        }
        #analysis-panel .section-title {
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
            margin: 8px 0 4px;
            border-top: 1px solid #333;
            padding-top: 6px;
        }
        #analysis-panel .section-title:first-child {
            margin-top: 0;
            border-top: none;
            padding-top: 0;
        }
        #analysis-panel button {
            font-family: monospace;
            font-size: 12px;
            padding: 3px 8px;
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
        }
        #analysis-panel button:hover { border-color: #aaa; }
        #analysis-panel select {
            font-family: monospace;
            font-size: 12px;
            padding: 2px 4px;
            background: #222;
            color: #ccc;
            border: 1px solid #555;
        }
        #analysis-stats {
            margin-top: 8px;
            color: #888;
            font-size: 11px;
            line-height: 1.5;
            border-top: 1px solid #333;
            padding-top: 6px;
        }

        #help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
            color: #555;
            z-index: 5;
            pointer-events: none;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="ui">
        <select id="level-select"></select>
        <select id="mode-select"></select>
    </div>
    <div id="analysis-panel">
        <div class="section-title">Predicted Lighting</div>
        <label>Ambient <input type="range" id="sl-ambient" min="0" max="100" value="30"><span id="val-ambient">0.30</span></label>
        <label>Intensity <input type="range" id="sl-intensity" min="0" max="100" value="70"><span id="val-intensity">0.70</span></label>
        <label>Height Falloff <input type="range" id="sl-height" min="0" max="100" value="50"><span id="val-height">0.50</span></label>
        <button id="btn-compute-heights">Compute Local Heights</button>
        <div style="font-size:10px; color:#666; margin-top:2px">Raycasts up/down per vertex to find local floor/ceiling</div>

        <div class="section-title">Ambient Occlusion</div>
        <label>Samples
            <select id="ao-samples">
                <option value="8">8</option>
                <option value="16" selected>16</option>
                <option value="32">32</option>
                <option value="64">64</option>
            </select>
        </label>
        <label>Radius <input type="range" id="sl-ao-radius" min="50" max="2000" value="500"><span id="val-ao-radius">500</span></label>
        <button id="btn-compute-ao">Compute AO</button>

        <div id="analysis-stats"></div>
    </div>
    <div id="loading">Loading...</div>
    <div id="crosshair"></div>
    <div id="lock-prompt">Click to enter</div>
    <div id="speed-display"></div>
    <div id="help">WASD: move &nbsp; Mouse: look &nbsp; Space: up &nbsp; Shift: sprint &nbsp; Scroll: speed</div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
